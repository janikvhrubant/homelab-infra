name: Authentik Setup

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          if ! command -v kubectl &>/dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          fi

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          kubectl config set-cluster homelab \
            --server=https://kubernetes.default.svc \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner \
            --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          kubectl config set-context homelab --cluster=homelab --user=runner
          kubectl config use-context homelab

      - name: Wait for Authentik to be ready
        run: |
          kubectl rollout status deployment/authentik-server -n authentik --timeout=300s
          for i in $(seq 1 30); do
            if kubectl exec -n authentik deployment/authentik-server -- \
                python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:9000/api/v3/root/config/')" > /dev/null 2>&1; then
              echo "Authentik API is ready"
              break
            fi
            echo "Waiting for API... ($i/30)"
            sleep 10
          done

      - name: Wait for blueprint to be applied
        run: |
          # Give the worker time to apply the homelab blueprint
          for i in $(seq 1 20); do
            STATUS=$(kubectl exec -n authentik deployment/authentik-server -- \
              ak shell -c "
from authentik.blueprints.models import BlueprintInstance
b = BlueprintInstance.objects.filter(name='Homelab - Groups, OIDC Providers and Applications').first()
print(b.status if b else 'not_found')
" 2>/dev/null | tr -d '[:space:]')
            echo "Blueprint status: ${STATUS}"
            if [ "${STATUS}" = "successful" ]; then
              echo "Blueprint applied successfully"
              break
            fi
            sleep 15
          done

      - name: Store OIDC client secrets as Kubernetes secrets
        run: |
          AUTHENTIK_TOKEN=$(kubectl get secret authentik-credentials -n authentik \
            -o jsonpath='{.data.bootstrap-token}' | base64 -d)

          for app in nextcloud paperless immich matrix; do
            SECRET=$(kubectl exec -n authentik deployment/authentik-server -- \
              ak shell -c "
from authentik.providers.oauth2.models import OAuth2Provider
p = OAuth2Provider.objects.filter(name='${app}').first()
print(p.client_secret if p else '')
" 2>/dev/null | tr -d '[:space:]')

            if [ -n "${SECRET}" ] && [ "${SECRET}" != "None" ]; then
              echo "Storing secret for ${app}"
              kubectl create namespace ${app} 2>/dev/null || true
              kubectl create secret generic kanidm-${app}-oidc \
                --namespace ${app} \
                --from-literal=client-secret="${SECRET}" \
                --dry-run=client -o yaml | kubectl apply -f -
            else
              echo "WARNING: No secret found for ${app} — blueprint may not have applied yet"
            fi
          done

          echo "=== Setup complete ==="
          echo "Next steps:"
          echo "1. Create users in Authentik at https://auth.lab.tanku.eu"
          echo "2. Add users to app_admins or app_users groups"
          echo "3. Run apps-apply workflow to update app OIDC configs"
