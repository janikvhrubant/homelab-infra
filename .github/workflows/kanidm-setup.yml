name: Kanidm Setup

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'Kanidm idm_admin password'
        required: true
        type: string
      create_reset_tokens:
        description: 'Create credential reset tokens for janik and app_admin'
        required: false
        type: boolean
        default: false

jobs:
  setup:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          if ! command -v kubectl &>/dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          fi

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          kubectl config set-cluster homelab \
            --server=https://kubernetes.default.svc \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner \
            --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          kubectl config set-context homelab --cluster=homelab --user=runner
          kubectl config use-context homelab

      - name: Setup Kanidm
        env:
          ADMIN_PASS: ${{ inputs.admin_password }}
        run: |
          # Find the kanidm service
          echo "=== Kanidm services ==="
          kubectl get svc -n kanidm

          # Cleanup any existing client pod
          kubectl delete pod kanidm-client -n kanidm --ignore-not-found=true

          # Start temporary kanidm client pod
          kubectl run kanidm-client \
            --image=docker.io/kanidm/tools:1.3.3 \
            --restart=Never \
            --namespace=kanidm \
            --command -- sleep 300 2>/dev/null || true

          kubectl wait --for=condition=ready pod/kanidm-client \
            -n kanidm --timeout=60s

          # Get kanidm service IP
          KANIDM_IP=$(kubectl get svc kanidm -n kanidm -o jsonpath='{.spec.clusterIP}')
          echo "Kanidm IP: ${KANIDM_IP}"

          # Write config file
          kubectl exec -n kanidm kanidm-client -- mkdir -p /root/.config
          kubectl exec -n kanidm kanidm-client -- sh -c "printf 'uri = \"https://${KANIDM_IP}:443\"\nverify_ca = false\nverify_hostnames = false\n' > /root/.config/kanidm"

          # Login
          echo "=== Login ==="
          kubectl exec -n kanidm kanidm-client -- \
            kanidm login --name idm_admin --password "${ADMIN_PASS}"

          # Create person
          echo "=== Create persons ==="
          kubectl exec -n kanidm kanidm-client -- kanidm person create janik 'Janik Hrubant' --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- kanidm person create app_admin 'App Admin' --name idm_admin || true

          # Create OIDC clients (idempotent - || true)
          echo "=== Create OIDC clients ==="
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 create nextcloud nextcloud https://cloud.lab.tanku.eu \
            --name idm_admin || true
          for app in paperless immich matrix; do
            kubectl exec -n kanidm kanidm-client -- \
              kanidm system oauth2 create $app $app https://${app}.lab.tanku.eu \
              --name idm_admin || true
          done

          # Create groups and assign members
          echo "=== Create groups ==="
          kubectl exec -n kanidm kanidm-client -- \
            kanidm group create lab-users --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm group add-members lab-users janik app_admin --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm group create app-admins --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm group add-members app-admins app_admin --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm group create nextcloud-admins --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm group add-members nextcloud-admins app_admin --name idm_admin || true

          # Create scope maps
          echo "=== Create scope maps ==="
          for app in paperless immich matrix; do
            kubectl exec -n kanidm kanidm-client -- \
              kanidm system oauth2 create-scope-map $app lab-users openid profile email \
              --name idm_admin || true
            kubectl exec -n kanidm kanidm-client -- \
              kanidm system oauth2 create-scope-map $app app-admins openid profile email groups \
              --name idm_admin || true
          done
          # nextcloud gets groups scope for admin mapping
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 create-scope-map nextcloud lab-users openid profile email groups \
            --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 create-scope-map nextcloud nextcloud-admins openid profile email groups \
            --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 create-scope-map nextcloud app-admins openid profile email groups \
            --name idm_admin || true

          # Nextcloud-specific OAuth2 settings
          echo "=== Nextcloud OAuth2 settings ==="
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 prefer-short-username nextcloud --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 disable-consent-prompt nextcloud --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 add-redirect-url nextcloud \
            https://cloud.lab.tanku.eu/apps/user_oidc/code --name idm_admin || true

          # Paperless-specific OAuth2 settings
          echo "=== Paperless OAuth2 settings ==="
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 prefer-short-username paperless --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 disable-consent-prompt paperless --name idm_admin || true
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 add-redirect-url paperless \
            https://paperless.lab.tanku.eu/accounts/oidc/kanidm/login/callback/ --name idm_admin || true

          # Fix nextcloud landing URL
          echo "=== Fix nextcloud landing URL ==="
          kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 set-landing-url nextcloud https://cloud.lab.tanku.eu \
            --name idm_admin || true

          echo "=== OAuth2 list ==="
          kubectl exec -n kanidm kanidm-client -- kanidm system oauth2 list --name idm_admin || true

          # Store nextcloud client secret as Kubernetes secret for apps-apply
          echo "=== Store nextcloud client secret ==="
          NEXTCLOUD_SECRET=$(kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 show-basic-secret nextcloud --name idm_admin)
          kubectl create namespace nextcloud 2>/dev/null || true
          kubectl create secret generic kanidm-nextcloud-oidc \
            --namespace nextcloud \
            --from-literal=client-secret="${NEXTCLOUD_SECRET}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Store paperless client secret
          echo "=== Store paperless client secret ==="
          PAPERLESS_SECRET=$(kubectl exec -n kanidm kanidm-client -- \
            kanidm system oauth2 show-basic-secret paperless --name idm_admin)
          kubectl create namespace paperless 2>/dev/null || true
          kubectl create secret generic kanidm-paperless-oidc \
            --namespace paperless \
            --from-literal=client-secret="${PAPERLESS_SECRET}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl delete pod kanidm-client -n kanidm

      - name: Generate credential reset tokens
        if: ${{ inputs.create_reset_tokens == true }}
        run: |
          KANIDM_IP=$(kubectl get svc kanidm -n kanidm -o jsonpath='{.spec.clusterIP}')
          kubectl run kanidm-client \
            --image=docker.io/kanidm/tools:1.3.3 \
            --restart=Never \
            --namespace=kanidm \
            --command -- sleep 120 2>/dev/null || true
          kubectl wait --for=condition=ready pod/kanidm-client -n kanidm --timeout=60s
          kubectl exec -n kanidm kanidm-client -- mkdir -p /root/.config
          kubectl exec -n kanidm kanidm-client -- sh -c "printf 'uri = \"https://${KANIDM_IP}:443\"\nverify_ca = false\nverify_hostnames = false\n' > /root/.config/kanidm"
          kubectl exec -n kanidm kanidm-client -- \
            kanidm login --name idm_admin --password "${{ inputs.admin_password }}"

          echo "=== Reset token for janik ==="
          kubectl exec -n kanidm kanidm-client -- \
            kanidm person credential create-reset-token janik --name idm_admin

          echo "=== Reset token for app_admin ==="
          kubectl exec -n kanidm kanidm-client -- \
            kanidm person credential create-reset-token app_admin --name idm_admin

          kubectl delete pod kanidm-client -n kanidm
