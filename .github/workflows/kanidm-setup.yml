name: Kanidm Setup

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'Kanidm idm_admin password'
        required: true
        type: string

jobs:
  setup:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          if ! command -v kubectl &>/dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          fi

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          kubectl config set-cluster homelab \
            --server=https://kubernetes.default.svc \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner \
            --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          kubectl config set-context homelab --cluster=homelab --user=runner
          kubectl config use-context homelab

      - name: Setup Kanidm
        env:
          ADMIN_PASS: ${{ inputs.admin_password }}
        run: |
          # Find the kanidm service
          echo "=== Kanidm services ==="
          kubectl get svc -n kanidm

          # Cleanup any existing client pod
          kubectl delete pod kanidm-client -n kanidm --ignore-not-found=true

          # Start temporary kanidm client pod
          kubectl run kanidm-client \
            --image=docker.io/kanidm/tools:1.3.3 \
            --restart=Never \
            --namespace=kanidm \
            --command -- sleep 300 2>/dev/null || true

          kubectl wait --for=condition=ready pod/kanidm-client \
            -n kanidm --timeout=60s

          # Get kanidm service IP
          KANIDM_IP=$(kubectl get svc kanidm -n kanidm -o jsonpath='{.spec.clusterIP}')
          echo "Kanidm IP: ${KANIDM_IP}"

          # Write config file
          kubectl exec -n kanidm kanidm-client -- mkdir -p /root/.config
          kubectl exec -n kanidm kanidm-client -- sh -c "printf 'uri = \"https://${KANIDM_IP}:443\"\nverify_ca = false\nverify_hostnames = false\n' > /root/.config/kanidm"

          # Login
          echo "=== Login ==="
          kubectl exec -n kanidm kanidm-client -- \
            kanidm login --name idm_admin --password "${ADMIN_PASS}"

          # Create person
          echo "=== Create person janik ==="
          kubectl exec -n kanidm kanidm-client -- kanidm person create janik 'Janik Hrubant' --name idm_admin || true

          # Create OIDC clients
          echo "=== Create OIDC clients ==="
          for app in nextcloud paperless immich matrix; do
            kubectl exec -n kanidm kanidm-client -- \
              kanidm system oauth2 create-basic $app $app https://${app}.lab.tanku.eu \
              --name idm_admin || true
          done

          echo "=== OAuth2 list ==="
          kubectl exec -n kanidm kanidm-client -- kanidm system oauth2 list --name idm_admin || true

          kubectl delete pod kanidm-client -n kanidm
