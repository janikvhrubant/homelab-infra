name: Kanidm Setup

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'Kanidm admin password'
        required: true
        type: string

jobs:
  setup:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          kubectl config set-cluster homelab \
            --server=https://kubernetes.default.svc \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner \
            --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          kubectl config set-context homelab --cluster=homelab --user=runner
          kubectl config use-context homelab

      - name: Setup Kanidm
        run: |
          kubectl exec -n kanidm kanidm-0 -- kanidm login \
            --name admin \
            --url https://localhost:443 \
            --password "${{ inputs.admin_password }}" \
            --skip-tls-verify || true

          # Create main user
          kubectl exec -n kanidm kanidm-0 -- kanidm person create janik \
            --name admin \
            --url https://localhost:443 \
            --skip-tls-verify || true

          # Create OIDC clients
          for app in nextcloud paperless immich matrix; do
            kubectl exec -n kanidm kanidm-0 -- kanidm system oauth2 create $app \
              "https://${app}.lab.tanku.eu" \
              "https://${app}.lab.tanku.eu/oauth2/callback" \
              --name admin \
              --url https://localhost:443 \
              --skip-tls-verify || true
          done

          echo "=== Kanidm setup complete ==="
          kubectl exec -n kanidm kanidm-0 -- kanidm system oauth2 list \
            --name admin \
            --url https://localhost:443 \
            --skip-tls-verify || true
