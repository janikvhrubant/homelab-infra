name: Kanidm Setup

on:
  workflow_dispatch:
    inputs:
      admin_password:
        description: 'Kanidm admin password'
        required: true
        type: string

jobs:
  setup:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          if ! command -v kubectl &>/dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          fi

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          kubectl config set-cluster homelab \
            --server=https://kubernetes.default.svc \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner \
            --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          kubectl config set-context homelab --cluster=homelab --user=runner
          kubectl config use-context homelab

      - name: Setup Kanidm
        run: |
          # Create main user
          kubectl exec -n kanidm kanidm-0 -- kanidmd recover-account idm_admin 2>/dev/null || true

          echo "=== Creating person janik ==="
          kubectl exec -n kanidm kanidm-0 -- kanidmd person create \
            --name janik --displayname "Janik Hrubant" 2>/dev/null || true

          echo "=== Creating OIDC clients ==="
          for app in nextcloud paperless immich matrix; do
            kubectl exec -n kanidm kanidm-0 -- kanidmd system oauth2 create \
              $app "${app^}" "https://${app}.lab.tanku.eu" 2>/dev/null || true
          done

          echo "=== OAuth2 clients ==="
          kubectl exec -n kanidm kanidm-0 -- kanidmd system oauth2 list 2>/dev/null || true
