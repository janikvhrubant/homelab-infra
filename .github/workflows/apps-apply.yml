name: Apps Apply

on:
  push:
    branches: [master]
    paths:
      - 'apps/**'
      - '.github/workflows/apps-apply.yml'
  workflow_dispatch:

jobs:
  apply:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          if ! command -v kubectl &>/dev/null; then
            curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            chmod +x kubectl && sudo mv kubectl /usr/local/bin/
          fi
          if ! command -v helm &>/dev/null; then
            curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          if ! command -v sops &>/dev/null; then
            curl -fsSL https://github.com/getsops/sops/releases/latest/download/sops-v3.13.2.linux.amd64 -o sops
            chmod +x sops && sudo mv sops /usr/local/bin/
          fi

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          kubectl config set-cluster homelab \
            --server=https://kubernetes.default.svc \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner \
            --token=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)
          kubectl config set-context homelab --cluster=homelab --user=runner
          kubectl config use-context homelab

      - name: Add Helm repos
        run: |
          helm repo add bjw-s https://bjw-s-labs.github.io/helm-charts
          helm repo add nextcloud https://nextcloud.github.io/helm/
          helm repo add immich https://immich-app.github.io/immich-charts
          helm repo update

      - name: Deploy Vaultwarden
        run: |
          kubectl create namespace vaultwarden 2>/dev/null || true
          kubectl label namespace vaultwarden pod-security.kubernetes.io/enforce=privileged --overwrite
          helm dependency update apps/vaultwarden
          helm upgrade --install vaultwarden apps/vaultwarden \
            --namespace vaultwarden \
            --values apps/vaultwarden/values.yaml \
            --wait

      - name: Deploy ActualBudget
        run: |
          kubectl create namespace actualbudget 2>/dev/null || true

          # Build OIDC config secret from Authentik client secret
          AB_SECRET=$(kubectl get secret authentik-actualbudget-oidc \
            -n actualbudget -o jsonpath='{.data.client-secret}' 2>/dev/null | base64 -d || echo "")
          if [ -n "${AB_SECRET}" ]; then
            kubectl create secret generic actualbudget-oidc-config \
              --namespace actualbudget \
              --from-literal=ACTUAL_OPENID_DISCOVERY_URL="https://auth.lab.tanku.eu/application/o/actualbudget/" \
              --from-literal=ACTUAL_OPENID_CLIENT_ID="actualbudget" \
              --from-literal=ACTUAL_OPENID_CLIENT_SECRET="${AB_SECRET}" \
              --dry-run=client -o yaml | kubectl apply -f -
          else
            echo "WARNING: authentik-actualbudget-oidc not found — run authentik-setup workflow first"
            kubectl create secret generic actualbudget-oidc-config \
              --namespace actualbudget \
              --from-literal=PLACEHOLDER=true \
              --dry-run=client -o yaml | kubectl apply -f -
          fi

          helm dependency update apps/actualbudget
          helm upgrade --install actualbudget apps/actualbudget \
            --namespace actualbudget \
            --values apps/actualbudget/values.yaml \
            --wait

          # Write full OpenID config into SQLite DB (ActualBudget reads issuer/client from extra_data, not env vars)
          if [ -n "${AB_SECRET}" ]; then
            kubectl rollout status deployment/actualbudget -n actualbudget --timeout=120s
            kubectl exec -n actualbudget deployment/actualbudget -- node -e "
const Database = require('better-sqlite3');
const db = new Database('/data/server-files/account.sqlite');
const extraData = JSON.stringify({
  issuer: 'https://auth.lab.tanku.eu/application/o/actualbudget/',
  client_id: 'actualbudget',
  client_secret: '${AB_SECRET}',
  server_hostname: 'https://budget.lab.tanku.eu'
});
const existing = db.prepare(\"SELECT * FROM auth WHERE method='openid'\").get();
if (existing) {
  db.prepare(\"UPDATE auth SET extra_data=?, active=1 WHERE method='openid'\").run(extraData);
} else {
  db.prepare(\"INSERT INTO auth (method, display_name, extra_data, active) VALUES ('openid','OpenID Connect',?,1)\").run(extraData);
}
db.prepare(\"UPDATE auth SET active=0 WHERE method='password'\").run();
console.log('OpenID config written to DB');
"
          fi

      - name: Deploy Nextcloud
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          kubectl create namespace nextcloud 2>/dev/null || true

          # Deploy credentials
          echo "$SOPS_AGE_KEY" > /tmp/age-key.txt
          export SOPS_AGE_KEY_FILE=/tmp/age-key.txt
          sops --decrypt apps/nextcloud/nextcloud-credentials.sops.yaml | kubectl apply -f -

          # Create PostgreSQL user and database if not exists
          NEXTCLOUD_DB_PASS=$(sops --decrypt apps/nextcloud/nextcloud-credentials.sops.yaml \
            | grep 'db-password' | awk '{print $2}' | tr -d '"')
          kubectl exec -n postgres postgres-0 -- psql -U postgres -tc \
            "SELECT 1 FROM pg_roles WHERE rolname='nextcloud'" | grep -q 1 || \
            kubectl exec -n postgres postgres-0 -- psql -U postgres \
              -c "CREATE USER nextcloud WITH PASSWORD '${NEXTCLOUD_DB_PASS}';"
          kubectl exec -n postgres postgres-0 -- psql -U postgres -tc \
            "SELECT 1 FROM pg_database WHERE datname='nextcloud'" | grep -q 1 || \
            kubectl exec -n postgres postgres-0 -- psql -U postgres \
              -c "CREATE DATABASE nextcloud OWNER nextcloud;"

          # Deploy Nextcloud
          helm dependency update apps/nextcloud
          helm upgrade --install nextcloud apps/nextcloud \
            --namespace nextcloud \
            --values apps/nextcloud/values.yaml \
            --set "nextcloud.extraEnv[0].name=DEPLOY_DATE" \
            --set "nextcloud.extraEnv[0].value=$(date +%s)" \
            --wait --timeout 10m

          # Patch hostAliases so Nextcloud can reach auth.lab.tanku.eu and office.lab.tanku.eu internally via Traefik (valid cert)
          TRAEFIK_IP=$(kubectl get svc -n traefik traefik -o jsonpath='{.spec.clusterIP}')
          kubectl patch deployment nextcloud -n nextcloud --type=json -p="[
            {\"op\": \"replace\", \"path\": \"/spec/template/spec/hostAliases\", \"value\": [
              {\"ip\": \"${TRAEFIK_IP}\", \"hostnames\": [\"auth.lab.tanku.eu\", \"office.lab.tanku.eu\"]}
            ]}
          ]" 2>/dev/null || \
          kubectl patch deployment nextcloud -n nextcloud --type=json -p="[
            {\"op\": \"add\", \"path\": \"/spec/template/spec/hostAliases\", \"value\": [
              {\"ip\": \"${TRAEFIK_IP}\", \"hostnames\": [\"auth.lab.tanku.eu\", \"office.lab.tanku.eu\"]}
            ]}
          ]"
          kubectl rollout status deployment/nextcloud -n nextcloud --timeout=120s

          # Configure OIDC via user_oidc app (idempotent)
          NEXTCLOUD_CLIENT_SECRET=$(kubectl get secret authentik-nextcloud-oidc \
            -n nextcloud -o jsonpath='{.data.client-secret}' 2>/dev/null | base64 -d || echo "")

          if [ -n "${NEXTCLOUD_CLIENT_SECRET}" ]; then
            kubectl exec -n nextcloud deployment/nextcloud -- \
              php /var/www/html/occ app:enable user_oidc 2>/dev/null || true

            # Remove legacy providers (idempotent)
            kubectl exec -n nextcloud deployment/nextcloud -- \
              php /var/www/html/occ user_oidc:provider:delete kanidm --force 2>/dev/null || true

            kubectl exec -n nextcloud deployment/nextcloud -- \
              php /var/www/html/occ user_oidc:provider authentik \
                --clientid="nextcloud" \
                --clientsecret="${NEXTCLOUD_CLIENT_SECRET}" \
                --discoveryuri="https://auth.lab.tanku.eu/application/o/nextcloud/.well-known/openid-configuration" \
                --scope="openid email profile" \
                --mapping-uid="preferred_username" \
                --mapping-display-name="name" \
                --mapping-email="email" \
                --mapping-groups="groups" \
                --group-provisioning=1 \
                --unique-uid=0 \
                --postlogouturi="https://auth.lab.tanku.eu/application/o/nextcloud/end-session/"

            # Disable local login — Authentik only
            kubectl exec -n nextcloud deployment/nextcloud -- \
              php /var/www/html/occ config:app:set user_oidc allow_multiple_user_backends --value="0"

            # Auto-redirect to Authentik when not logged in
            kubectl exec -n nextcloud deployment/nextcloud -- \
              php /var/www/html/occ config:app:set user_oidc auto_redirect_on_public_access --value="1"

            # Map app_admins group to Nextcloud admin
            kubectl exec -n nextcloud deployment/nextcloud -- \
              php /var/www/html/occ config:app:set user_oidc admin_groups \
                --value="app_admins"

            # Allow private network for Authentik
            kubectl exec -n nextcloud deployment/nextcloud -- \
              php /var/www/html/occ config:system:set allow_local_remote_servers --value=true --type=bool

            echo "OIDC configured successfully"
          else
            echo "WARNING: Could not retrieve Authentik client secret - run authentik-setup workflow first"
          fi

      - name: Deploy OnlyOffice
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          kubectl create namespace onlyoffice 2>/dev/null || true

          # Deploy secret
          echo "$SOPS_AGE_KEY" > /tmp/age-key.txt
          export SOPS_AGE_KEY_FILE=/tmp/age-key.txt
          sops --decrypt apps/onlyoffice/onlyoffice-secret.sops.yaml | kubectl apply -f -

          # Create PostgreSQL DB and user
          ONLYOFFICE_DB_PASS=$(sops --decrypt apps/onlyoffice/onlyoffice-secret.sops.yaml \
            | grep 'db-password' | awk '{print $2}' | tr -d '"')
          kubectl exec -n postgres postgres-0 -- psql -U postgres -tc \
            "SELECT 1 FROM pg_roles WHERE rolname='onlyoffice'" | grep -q 1 || \
            kubectl exec -n postgres postgres-0 -- psql -U postgres \
              -c "CREATE USER onlyoffice WITH PASSWORD '${ONLYOFFICE_DB_PASS}';"
          kubectl exec -n postgres postgres-0 -- psql -U postgres -tc \
            "SELECT 1 FROM pg_database WHERE datname='onlyoffice'" | grep -q 1 || \
            kubectl exec -n postgres postgres-0 -- psql -U postgres \
              -c "CREATE DATABASE onlyoffice OWNER onlyoffice;"

          helm dependency update apps/onlyoffice
          helm upgrade --install onlyoffice apps/onlyoffice \
            --namespace onlyoffice \
            --values apps/onlyoffice/values.yaml \
            --wait --timeout 5m

          # Configure Nextcloud to use OnlyOffice
          JWT_SECRET=$(sops --decrypt apps/onlyoffice/onlyoffice-secret.sops.yaml \
            | grep 'jwt-secret' | awk '{print $2}' | tr -d '"')
          kubectl exec -n nextcloud deployment/nextcloud -- \
            php /var/www/html/occ app:enable onlyoffice 2>/dev/null || true
          kubectl exec -n nextcloud deployment/nextcloud -- \
            php /var/www/html/occ config:app:set onlyoffice DocumentServerUrl \
              --value="https://office.lab.tanku.eu/"
          kubectl exec -n nextcloud deployment/nextcloud -- \
            php /var/www/html/occ config:app:set onlyoffice jwt_secret \
              --value="${JWT_SECRET}"
          kubectl exec -n nextcloud deployment/nextcloud -- \
            php /var/www/html/occ config:app:set onlyoffice jwt_header \
              --value="Authorization"
          kubectl exec -n nextcloud deployment/nextcloud -- \
            php /var/www/html/occ config:app:set onlyoffice StorageUrl \
              --value="https://cloud.lab.tanku.eu/"
          kubectl exec -n nextcloud deployment/nextcloud -- \
            php /var/www/html/occ config:app:set onlyoffice DocumentServerInternalUrl \
              --value="https://office.lab.tanku.eu/"

      - name: Deploy Paperless
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          kubectl create namespace paperless 2>/dev/null || true
          echo "$SOPS_AGE_KEY" > /tmp/age-key.txt
          export SOPS_AGE_KEY_FILE=/tmp/age-key.txt
          sops --decrypt apps/paperless/paperless-credentials.sops.yaml | kubectl apply -f -

          # Create PostgreSQL DB and user
          PAPERLESS_DB_PASS=$(sops --decrypt apps/paperless/paperless-credentials.sops.yaml \
            | grep 'PAPERLESS_DBPASS' | awk '{print $2}' | tr -d '"')
          kubectl exec -n postgres postgres-0 -- psql -U postgres -tc \
            "SELECT 1 FROM pg_roles WHERE rolname='paperless'" | grep -q 1 || \
            kubectl exec -n postgres postgres-0 -- psql -U postgres \
              -c "CREATE USER paperless WITH PASSWORD '${PAPERLESS_DB_PASS}';"
          kubectl exec -n postgres postgres-0 -- psql -U postgres -tc \
            "SELECT 1 FROM pg_database WHERE datname='paperless'" | grep -q 1 || \
            kubectl exec -n postgres postgres-0 -- psql -U postgres \
              -c "CREATE DATABASE paperless OWNER paperless;"

          # Get Authentik secret for paperless OIDC and store as env secret
          PAPERLESS_SECRET=$(kubectl get secret authentik-paperless-oidc \
            -n paperless -o jsonpath='{.data.client-secret}' 2>/dev/null | base64 -d || echo "")
          if [ -n "${PAPERLESS_SECRET}" ]; then
            kubectl create secret generic paperless-oidc-config \
              --namespace paperless \
              --from-literal=PAPERLESS_SOCIALACCOUNT_PROVIDERS="{\"openid_connect\":{\"OAUTH_PKCE_ENABLED\":true,\"APPS\":[{\"provider_id\":\"authentik\",\"name\":\"authentik\",\"client_id\":\"paperless\",\"secret\":\"${PAPERLESS_SECRET}\",\"settings\":{\"server_url\":\"https://auth.lab.tanku.eu/application/o/paperless/.well-known/openid-configuration\",\"fetch_userinfo\":true}}],\"SCOPE\":[\"openid\",\"profile\",\"email\"]}}" \
              --dry-run=client -o yaml | kubectl apply -f -
          fi

          helm dependency update apps/paperless
          helm upgrade --install paperless apps/paperless \
            --namespace paperless \
            --values apps/paperless/values.yaml \
            --wait --timeout 5m

      - name: Deploy Immich
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          kubectl create namespace immich 2>/dev/null || true
          echo "$SOPS_AGE_KEY" > /tmp/age-key.txt
          export SOPS_AGE_KEY_FILE=/tmp/age-key.txt
          sops --decrypt apps/immich/immich-credentials.sops.yaml | kubectl apply -f -

          # Deploy pgvecto-rs PostgreSQL for immich
          kubectl apply -f apps/immich/postgres.yaml

          # Wait for PostgreSQL to be ready
          kubectl rollout status statefulset/immich-db -n immich --timeout=120s

          # Create PVC for immich library if not exists
          kubectl get pvc immich-library -n immich 2>/dev/null || \
            kubectl apply -f apps/immich/pvc.yaml

          helm upgrade --install immich immich/immich \
            --version 0.12.0 \
            --namespace immich \
            --values apps/immich/values.yaml \
            --timeout 15m || \
          (kubectl delete deployment immich-server immich-machine-learning -n immich --ignore-not-found=true && \
           helm upgrade --install immich immich/immich \
             --version 0.12.0 \
             --namespace immich \
             --values apps/immich/values.yaml \
             --timeout 15m)

          # Patch startup probe - chart ignores our initialDelaySeconds
          kubectl patch deployment immich-server -n immich --type=json -p='[
            {"op":"replace","path":"/spec/template/spec/containers/0/startupProbe/initialDelaySeconds","value":60},
            {"op":"replace","path":"/spec/template/spec/containers/0/startupProbe/failureThreshold","value":60}
          ]' 2>/dev/null || true

          # Add hostAliases for internal DNS resolution
          TRAEFIK_IP=$(kubectl get svc -n traefik traefik -o jsonpath='{.spec.clusterIP}')
          kubectl patch deployment immich-server -n immich --type=json -p="[
            {\"op\": \"add\", \"path\": \"/spec/template/spec/hostAliases\", \"value\": [
              {\"ip\": \"${TRAEFIK_IP}\", \"hostnames\": [\"auth.lab.tanku.eu\"]}
            ]}
          ]" 2>/dev/null || true

          # Remove legacy redirect-login middleware if it exists (caused OAuth callback loop)
          # This middleware was used as a workaround but breaks the OAuth flow by redirecting
          # /auth/login?code=...&state=... to / before Immich can process the callback.
          kubectl delete middleware -n immich redirect-login 2>/dev/null || true
          kubectl annotate ingress -n immich immich-server \
            'traefik.ingress.kubernetes.io/router.middlewares-' 2>/dev/null || true

          # Configure Immich OAuth via DB (API requires auth, DB is reliable)
          # IMPORTANT: autoLaunch must be false — with true, Immich starts a new OAuth flow
          # on every visit to /auth/login, overwriting the stored PKCE state and breaking
          # the callback. Users click the "Login with Authentik" button manually.
          # IMPORTANT: passwordLogin must be an object {"enabled": false}, not a boolean.
          # The Immich schema changed and a bare `false` causes a ValidationError that
          # silently breaks all OAuth callbacks.
          IMMICH_CLIENT_SECRET=$(kubectl get secret authentik-immich-oidc \
            -n immich -o jsonpath='{.data.client-secret}' 2>/dev/null | base64 -d || echo "")
          if [ -n "${IMMICH_CLIENT_SECRET}" ]; then
            # Wait for Immich DB to be ready
            kubectl rollout status statefulset/immich-db -n immich --timeout=120s

            kubectl exec -n immich immich-db-0 -- psql -U immich -d immich -c "
              INSERT INTO system_metadata (key, value) VALUES ('system-config', '{}'::jsonb)
              ON CONFLICT (key) DO NOTHING;
              UPDATE system_metadata SET value = jsonb_build_object(
                'oauth', jsonb_build_object(
                  'enabled', true,
                  'clientId', 'immich',
                  'clientSecret', '${IMMICH_CLIENT_SECRET}',
                  'issuerUrl', 'https://auth.lab.tanku.eu/application/o/immich/',
                  'scope', 'openid email profile',
                  'signingAlgorithm', 'RS256',
                  'autoLaunch', false,
                  'autoRegister', true,
                  'buttonText', 'Login with Authentik',
                  'storageLabelClaim', 'preferred_username',
                  'profileImageClaim', 'picture',
                  'defaultStorageQuota', 0
                ),
                'passwordLogin', jsonb_build_object('enabled', false)
              )
              WHERE key = 'system-config';
            " && echo "Immich OAuth configured via DB" || echo "WARNING: Could not configure Immich OAuth"

            kubectl rollout restart deployment/immich-server -n immich
            kubectl rollout status deployment/immich-server -n immich --timeout=300s
          else
            echo "WARNING: Could not retrieve Authentik client secret for Immich - run authentik-setup workflow first"
          fi

      - name: Deploy ExcaliDash
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        run: |
          kubectl create namespace excalidraw 2>/dev/null || true
          echo "$SOPS_AGE_KEY" > /tmp/age-key.txt
          export SOPS_AGE_KEY_FILE=/tmp/age-key.txt

          # Deploy static credentials
          sops --decrypt apps/excalidraw/excalidraw-credentials.sops.yaml | kubectl apply -f -

          # Build combined config secret (static + OIDC)
          OIDC_SECRET=$(kubectl get secret authentik-excalidash-oidc \
            -n excalidraw -o jsonpath='{.data.client-secret}' 2>/dev/null | base64 -d || echo "")
          JWT_SECRET=$(sops --decrypt apps/excalidraw/excalidraw-credentials.sops.yaml \
            | grep 'JWT_SECRET' | awk '{print $2}' | tr -d '"')
          CSRF_SECRET=$(sops --decrypt apps/excalidraw/excalidraw-credentials.sops.yaml \
            | grep 'CSRF_SECRET' | awk '{print $2}' | tr -d '"')
          PEPPER=$(sops --decrypt apps/excalidraw/excalidraw-credentials.sops.yaml \
            | grep 'API_KEY_HASH_PEPPER' | awk '{print $2}' | tr -d '"')

          kubectl create secret generic excalidash-config \
            --namespace excalidraw \
            --from-literal=AUTH_MODE=oidc_enforced \
            --from-literal=FRONTEND_URL=https://draw.lab.tanku.eu \
            --from-literal=TRUST_PROXY=1 \
            --from-literal=OIDC_PROVIDER_NAME=authentik \
            --from-literal=OIDC_ISSUER_URL=https://auth.lab.tanku.eu/application/o/excalidash/ \
            --from-literal=OIDC_CLIENT_ID=excalidash \
            --from-literal=OIDC_CLIENT_SECRET="${OIDC_SECRET}" \
            --from-literal=OIDC_REDIRECT_URI=https://draw.lab.tanku.eu/api/auth/oidc/callback \
            --from-literal=OIDC_ADMIN_GROUPS=app_admins \
            --from-literal=OIDC_REQUIRE_EMAIL_VERIFIED=false \
            --from-literal=JWT_SECRET="${JWT_SECRET}" \
            --from-literal=CSRF_SECRET="${CSRF_SECRET}" \
            --from-literal=API_KEY_HASH_PEPPER="${PEPPER}" \
            --from-literal=UPDATE_CHECK_OUTBOUND=false \
            --from-literal=DATABASE_URL=file:/app/prisma/dev.db \
            --dry-run=client -o yaml | kubectl apply -f -

          helm dependency update apps/excalidraw
          helm upgrade --install excalidash apps/excalidraw \
            --namespace excalidraw \
            --values apps/excalidraw/values.yaml \
            --timeout 10m || echo "WARNING: ExcaliDash deploy failed (image may not be built yet)"
