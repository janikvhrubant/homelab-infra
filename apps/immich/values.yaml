immich:
  persistence:
    library:
      existingClaim: immich-library

env:
  DB_HOSTNAME: "immich-postgresql"
  DB_DATABASE_NAME: "immich"
  DB_USERNAME: "immich"
  DB_PASSWORD:
    valueFrom:
      secretKeyRef:
        name: immich-credentials
        key: db-password
  REDIS_HOSTNAME: "redis.redis.svc.lab.tanku.eu"
  REDIS_PORT: "6379"

postgresql:
  enabled: true
  useDeprecatedPostgresChart: true
  global:
    postgresql:
      auth:
        username: immich
        database: immich
        existingSecret: immich-credentials
        secretKeys:
          adminPasswordKey: db-password
          userPasswordKey: db-password
  image:
    repository: tensorchord/pgvecto-rs
    tag: pg14-v0.2.0
  primary:
    initdb:
      scripts:
        create-extensions.sql: |
          CREATE EXTENSION IF NOT EXISTS vectors;
          CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
    persistence:
      size: 10Gi

redis:
  enabled: false

server:
  ingress:
    main:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host immich.lab.tanku.eu
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: immich-tls
          hosts:
            - *host
