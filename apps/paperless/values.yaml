app-template:
  controllers:
    main:
      type: statefulset
      containers:
        main:
          image:
            repository: ghcr.io/paperless-ngx/paperless-ngx
            tag: "2.14"
          env:
            PAPERLESS_PORT: "8000"
            PAPERLESS_URL: "https://paperless.lab.tanku.eu"
            PAPERLESS_DBHOST: "postgres.postgres.svc.lab.tanku.eu"
            PAPERLESS_DBNAME: "paperless"
            PAPERLESS_DBUSER: "paperless"
            PAPERLESS_DBPASS:
              valueFrom:
                secretKeyRef:
                  name: paperless-credentials
                  key: PAPERLESS_DBPASS
            PAPERLESS_SECRET_KEY:
              valueFrom:
                secretKeyRef:
                  name: paperless-credentials
                  key: PAPERLESS_SECRET_KEY
            PAPERLESS_REDIS: "redis://redis.redis.svc.lab.tanku.eu:6379"
            PAPERLESS_ADMIN_USER: "app_admin"
            PAPERLESS_ADMIN_MAIL: "admin@lab.tanku.eu"
            PAPERLESS_APPS: "allauth.socialaccount.providers.openid_connect"
            PAPERLESS_DISABLE_REGULAR_LOGIN: "true"
            PAPERLESS_SOCIALACCOUNT_AUTO_LOGIN: "true"
            PAPERLESS_ACCOUNT_DEFAULT_HTTP_PROTOCOL: "https"
            PAPERLESS_LOGOUT_REDIRECT_URL: "https://auth.lab.tanku.eu/if/session-end/"
          envFrom:
            - secretRef:
                name: paperless-oidc-config
                optional: true
      statefulset:
        volumeClaimTemplates:
          - name: data
            size: 20Gi
            accessMode: ReadWriteOnce
            globalMounts:
              - path: /usr/src/paperless/data
                subPath: data
              - path: /usr/src/paperless/media
                subPath: media

  configMaps:
    adapter:
      enabled: true
      data:
        adapter.py: |
          from urllib.parse import quote

          from allauth.account.adapter import DefaultAccountAdapter
          from allauth.core import context
          from allauth.socialaccount.adapter import DefaultSocialAccountAdapter
          from django.conf import settings
          from django.forms import ValidationError
          from django.urls import reverse


          class CustomAccountAdapter(DefaultAccountAdapter):
              def is_open_for_signup(self, request):
                  allow_signups = super().is_open_for_signup(request)
                  return getattr(settings, "ACCOUNT_ALLOW_SIGNUPS", allow_signups)

              def pre_authenticate(self, request, **credentials):
                  if settings.DISABLE_REGULAR_LOGIN:
                      raise ValidationError("Regular login is disabled")
                  return super().pre_authenticate(request, **credentials)

              def is_safe_url(self, url):
                  from django.utils.http import url_has_allowed_host_and_scheme
                  allowed_hosts = {context.request.get_host()} | set(settings.ALLOWED_HOSTS)
                  if "*" in allowed_hosts:
                      allowed_hosts.remove("*")
                      allowed_hosts.add(context.request.get_host())
                      return url_has_allowed_host_and_scheme(url, allowed_hosts=allowed_hosts)
                  return url_has_allowed_host_and_scheme(url, allowed_hosts=allowed_hosts)

              def get_reset_password_from_key_url(self, key):
                  if settings.PAPERLESS_URL is None:
                      return super().get_reset_password_from_key_url(key)
                  else:
                      path = reverse(
                          "account_reset_password_from_key",
                          kwargs={"uidb36": "UID", "key": "KEY"},
                      )
                      path = path.replace("UID-KEY", quote(key))
                      return settings.PAPERLESS_URL + path


          class CustomSocialAccountAdapter(DefaultSocialAccountAdapter):
              def is_open_for_signup(self, request, sociallogin):
                  allow_signups = super().is_open_for_signup(request, sociallogin)
                  return getattr(settings, "SOCIALACCOUNT_ALLOW_SIGNUPS", allow_signups)

              def get_connect_redirect_url(self, request, socialaccount):
                  return reverse("base")

              def populate_user(self, request, sociallogin, data):
                  user = super().populate_user(request, sociallogin, data)
                  self._apply_group_permissions(user, sociallogin)
                  return user

              def save_user(self, request, sociallogin, form=None):
                  user = super().save_user(request, sociallogin, form)
                  self._apply_group_permissions(user, sociallogin)
                  user.save()
                  return user

              def _apply_group_permissions(self, user, sociallogin):
                  groups = sociallogin.account.extra_data.get("groups", [])
                  if isinstance(groups, str):
                      groups = [groups]
                  is_admin = "app_admins" in groups
                  is_user = "app_users" in groups
                  user.is_active = is_admin or is_user
                  user.is_staff = is_admin or is_user
                  user.is_superuser = is_admin

  persistence:
    adapter:
      enabled: true
      type: configMap
      name: paperless-adapter
      globalMounts:
        - path: /usr/src/paperless/src/paperless/adapter.py
          subPath: adapter.py

  service:
    main:
      ports:
        http:
          port: 8000
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        traefik.ingress.kubernetes.io/router.middlewares: authentik-forwardauth-authentik@kubernetescrd
      hosts:
        - host: &host paperless.lab.tanku.eu
          paths:
            - path: /
              pathType: Prefix
              service:
                name: main
                port: http
      tls:
        - secretName: paperless-tls
          hosts:
            - *host
