app-template:
  controllers:
    main:
      type: statefulset
      containers:
        main:
          image:
            repository: ghcr.io/paperless-ngx/paperless-ngx
            tag: "2.14"
          env:
            PAPERLESS_PORT: "8000"
            PAPERLESS_URL: "https://paperless.lab.tanku.eu"
            PAPERLESS_DBHOST: "postgres.postgres.svc.lab.tanku.eu"
            PAPERLESS_DBNAME: "paperless"
            PAPERLESS_DBUSER: "paperless"
            PAPERLESS_DBPASS:
              valueFrom:
                secretKeyRef:
                  name: paperless-credentials
                  key: PAPERLESS_DBPASS
            PAPERLESS_SECRET_KEY:
              valueFrom:
                secretKeyRef:
                  name: paperless-credentials
                  key: PAPERLESS_SECRET_KEY
            PAPERLESS_REDIS: "redis://redis.redis.svc.lab.tanku.eu:6379"
            PAPERLESS_ADMIN_USER: "app_admin"
            PAPERLESS_ADMIN_MAIL: "admin@lab.tanku.eu"
            PAPERLESS_APPS: "allauth.socialaccount.providers.openid_connect"
            PAPERLESS_DISABLE_REGULAR_LOGIN: "false"
            PAPERLESS_ACCOUNT_DEFAULT_HTTP_PROTOCOL: "https"
          envFrom:
            - secretRef:
                name: paperless-oidc-config
                optional: true
      statefulset:
        volumeClaimTemplates:
          - name: data
            size: 20Gi
            accessMode: ReadWriteOnce
            globalMounts:
              - path: /usr/src/paperless/data
                subPath: data
              - path: /usr/src/paperless/media
                subPath: media

  service:
    main:
      ports:
        http:
          port: 8000
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host paperless.lab.tanku.eu
          paths:
            - path: /
              pathType: Prefix
              service:
                name: main
                port: http
      tls:
        - secretName: paperless-tls
          hosts:
            - *host
