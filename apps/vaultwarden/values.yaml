app-template:
  controllers:
    main:
      containers:
        main:
          image:
            repository: docker.io/vaultwarden/server
            tag: 1.32.7-alpine
          env:
            DOMAIN: https://vault.lab.tanku.eu
            SIGNUPS_ALLOWED: "false"

  service:
    main:
      ports:
        http:
          port: 80
          protocol: HTTP

  ingress:
    main:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      hosts:
        - host: &host vault.lab.tanku.eu
          paths:
            - path: /
              pathType: Prefix
              service:
                name: main
                port: http
      tls:
        - secretName: vaultwarden-tls
          hosts:
            - *host

  persistence:
    data:
      accessMode: ReadWriteOnce
      size: 1Gi
      globalMounts:
        - path: /data
