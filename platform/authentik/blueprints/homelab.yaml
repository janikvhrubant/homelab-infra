version: 1
metadata:
  name: Homelab - Groups, OIDC Providers and Applications
  labels:
    blueprints.goauthentik.io/instantiate: "true"
entries:
  # ============================================================
  # Groups
  # ============================================================
  - model: authentik_core.group
    identifiers:
      name: app_admins
    attrs:
      name: app_admins
      is_superuser: false

  - model: authentik_core.group
    identifiers:
      name: app_users
    attrs:
      name: app_users
      is_superuser: false

  # ============================================================
  # Custom groups scope mapping
  # ============================================================
  - model: authentik_providers_oauth2.scopemapping
    identifiers:
      name: homelab-groups-scope
    attrs:
      name: homelab-groups-scope
      scope_name: groups
      description: "Returns the user's groups"
      expression: |
        return [g.name for g in request.user.ak_groups.all()]

  # ============================================================
  # OIDC Provider: Nextcloud
  # ============================================================
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: nextcloud
    attrs:
      name: nextcloud
      client_id: nextcloud
      client_type: confidential
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      redirect_uris:
        - url: "https://cloud.lab.tanku.eu/apps/user_oidc/code"
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, homelab-groups-scope]]

  - model: authentik_core.application
    identifiers:
      slug: nextcloud
    attrs:
      name: Nextcloud
      slug: nextcloud
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, nextcloud]]
      meta_launch_url: https://cloud.lab.tanku.eu
      policy_engine_mode: any

  # ============================================================
  # OIDC Provider: Paperless
  # ============================================================
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: paperless
    attrs:
      name: paperless
      client_id: paperless
      client_type: confidential
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      redirect_uris:
        - url: "https://paperless.lab.tanku.eu/accounts/oidc/authentik/login/callback/"
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, homelab-groups-scope]]

  - model: authentik_core.application
    identifiers:
      slug: paperless
    attrs:
      name: Paperless
      slug: paperless
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, paperless]]
      meta_launch_url: https://paperless.lab.tanku.eu
      policy_engine_mode: any

  # ============================================================
  # OIDC Provider: Immich
  # ============================================================
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: immich
    attrs:
      name: immich
      client_id: immich
      client_type: confidential
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      redirect_uris:
        - url: "https://photos.lab.tanku.eu/auth/login"
          matching_mode: strict
        - url: "https://photos.lab.tanku.eu/user-settings"
          matching_mode: strict
        - url: "app.immich:///oauth-callback"
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, homelab-groups-scope]]

  - model: authentik_core.application
    identifiers:
      slug: immich
    attrs:
      name: Immich
      slug: immich
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, immich]]
      meta_launch_url: https://photos.lab.tanku.eu
      policy_engine_mode: any

  # ============================================================
  # OIDC Provider: Matrix
  # ============================================================
  - model: authentik_providers_oauth2.oauth2provider
    identifiers:
      name: matrix
    attrs:
      name: matrix
      client_id: matrix
      client_type: confidential
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      redirect_uris:
        - url: "https://matrix.lab.tanku.eu/_synapse/client/oidc/callback"
          matching_mode: strict
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
      sub_mode: hashed_user_id
      include_claims_in_id_token: true
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
        - !Find [authentik_providers_oauth2.scopemapping, [name, homelab-groups-scope]]

  - model: authentik_core.application
    identifiers:
      slug: matrix
    attrs:
      name: Matrix
      slug: matrix
      provider: !Find [authentik_providers_oauth2.oauth2provider, [name, matrix]]
      meta_launch_url: https://matrix.lab.tanku.eu
      policy_engine_mode: any
