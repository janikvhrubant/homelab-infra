apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: kanidm-insecure
  namespace: kanidm
spec:
  insecureSkipVerify: true
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kanidm-tls
  namespace: kanidm
spec:
  secretName: kanidm-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
    group: cert-manager.io
  dnsNames:
    - auth.lab.tanku.eu
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: kanidm
  namespace: kanidm
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`auth.lab.tanku.eu`)
      kind: Rule
      services:
        - name: kanidm
          port: 443
          scheme: https
          serversTransport: kanidm-insecure
  tls:
    secretName: kanidm-tls
