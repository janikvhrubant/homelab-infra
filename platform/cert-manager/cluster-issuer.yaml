apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    email: janikvhrubant@gmail.com
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - dns01:
          webhook:
            groupName: acme.lab.tanku.eu
            solverName: inwx
            config:
              apiUrl: https://api.inwx.de/json
              secretName: inwx-credentials
              ttl: 300
